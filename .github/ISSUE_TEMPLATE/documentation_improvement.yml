name: Documentation improvement
description: Report unclear, missing, or incorrect documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true

  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Link to the file/page/section that needs improvement.
      placeholder: docs/specs/feeds.md or URL
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is unclear or incorrect?
      description: Describe the specific problem.
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: Suggested improvement
      description: What change would make this clearer or more accurate?
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Who is affected most?
      options:
        - New contributors
        - Existing contributors
        - End users
        - Maintainers
        - Everyone
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Include examples, snippets/screenshots, or related links.
    validations:
      required: false
