name: Bug report
description: Report a reproducible bug or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest version.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the current behavior and what you expected.
      placeholder: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: Version, tag, or commit SHA.
      placeholder: 0.1.0
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant output.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add screenshots, recordings, or extra context if helpful.
    validations:
      required: false
